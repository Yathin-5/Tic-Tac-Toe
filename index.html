<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="gameMode">Mode:</label>
                <select id="gameMode">
                    <option value="bot">Play with Bot</option>
                    <option value="human">Play with Human</option>
                </select>
            </div>
            
            <div class="control-group" id="difficultyGroup">
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard (Unbeatable)</option>
                </select>
            </div>
        </div>

        <div class="status" id="statusPanel">Your turn (X)</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="resetBtn" class="reset-btn">Reset Game</button>
        <button onclick="window.location.href='normal.html'">new page</button>

    </div>
    <script src="script.js"></script>
</body>
</html>
